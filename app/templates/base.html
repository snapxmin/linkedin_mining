<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Talent Research{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

      <a class="brand" href="/">LinkedIn Talent Research</a>

</html>
